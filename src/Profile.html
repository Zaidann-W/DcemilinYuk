<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Profil pengguna DcemilinYuk.">
  <title>Profil - DcemilinYuk</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="profile-content">
    <div class="container">
      <h1 style="margin-bottom:0.5rem;">Profil Saya 👤</h1>
      <p style="color:var(--text-secondary);">Kelola informasi akun kamu.</p>

      <div class="profile-layout" style="margin-top:2rem;">
        <!-- Sidebar -->
        <div class="profile-sidebar">
          <div class="profile-avatar" id="profile-avatar">U</div>
          <div class="profile-name" id="profile-display-name">User</div>
          <div class="profile-email" id="profile-display-email">user@email.com</div>
          <div class="profile-menu">
            <a href="#" class="active">📝 Edit Profil</a>
            <a href="Cart.html">🛒 Keranjang</a>
            <a href="Logout.html">🚪 Keluar</a>
          </div>
        </div>

        <!-- Main Content -->
        <div class="profile-main">
          <h3 style="margin-bottom:1.5rem;">Edit Profil</h3>
          <form onsubmit="handleProfileUpdate(event)">
            <div class="form-group">
              <label class="form-label">Nama Lengkap</label>
              <input type="text" name="name" class="form-input" id="profile-name-input" required>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" id="profile-email-input" disabled style="opacity:0.6;cursor:not-allowed;">
            </div>
            <div class="form-group">
              <label class="form-label">No. Telepon</label>
              <input type="tel" name="phone" class="form-input" id="profile-phone-input" placeholder="08xx-xxxx-xxxx">
            </div>
            <div class="form-group">
              <label class="form-label">Alamat</label>
              <textarea name="address" class="form-input" id="profile-address-input" placeholder="Alamat lengkap"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!requireAuth()) return;
      const user = getCurrentUser();
      if (user) {
        document.getElementById('profile-avatar').textContent = user.name ? user.name[0].toUpperCase() : 'U';
        document.getElementById('profile-display-name').textContent = user.name || 'User';
        document.getElementById('profile-display-email').textContent = user.email || '';
        document.getElementById('profile-name-input').value = user.name || '';
        document.getElementById('profile-email-input').value = user.email || '';
        document.getElementById('profile-phone-input').value = user.phone || '';
        document.getElementById('profile-address-input').value = user.address || '';
      }
    });
  </script>
</body>
</html>
