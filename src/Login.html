<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Masuk ke akun DcemilinYuk.">
  <title>Masuk - DcemilinYuk</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <a href="index.html" style="display:block;text-align:center;font-family:var(--font-heading);font-size:1.5rem;font-weight:700;color:var(--primary);margin-bottom:1.5rem;">🍰 DcemilinYuk</a>
      <h2>Selamat Datang! 👋</h2>
      <p class="subtitle">Masuk ke akun kamu untuk melanjutkan belanja.</p>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" placeholder="contoh@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="Masukkan password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem;">Masuk</button>
      </form>

      <p class="auth-link">Belum punya akun? <a href="Register.html">Daftar sekarang</a></p>
      <p style="text-align:center;margin-top:1rem;"><a href="index.html" style="font-size:0.85rem;color:var(--text-muted);">← Kembali ke Beranda</a></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      if (isLoggedIn()) window.location.href = 'index.html';
    });
  </script>
</body>
</html>
