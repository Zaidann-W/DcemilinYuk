<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Keranjang belanja DcemilinYuk.">
  <title>Keranjang - DcemilinYuk</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="cart-content">
    <div class="container">
      <h1 style="margin-bottom:0.5rem;">Keranjang Belanja </h1>
      <p style="color:var(--text-secondary);">Kelola pesanan kamu sebelum checkout.</p>

      <div id="empty-cart" class="empty-cart" style="display:none;">
        <div style="font-size:4rem;margin-bottom:1rem;"> </div>
        <h3>Keranjang Kosong</h3>
        <p>Belum ada produk di keranjang kamu. Yuk mulai belanja!</p>
        <a href="Product.html" class="btn btn-primary" style="margin-top:1rem;">Lihat Produk</a>
      </div>

      <div class="cart-layout" id="cart-section">
        <div class="cart-items" id="cart-items-container"></div>
        <div class="cart-summary" id="cart-summary-container"></div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="js/app.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { renderCartPage(); });
  </script>
</body>
</html>
