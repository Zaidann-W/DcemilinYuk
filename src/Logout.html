<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout - DcemilinYuk</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="logout-page">
    <div class="logout-card fade-in">
      <div class="logout-icon">👋</div>
      <h2>Sampai Jumpa!</h2>
      <p>Kamu telah berhasil keluar dari akun.</p>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-top:1rem;">Mengalihkan ke beranda dalam <span id="countdown">3</span> detik...</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:1.5rem;">Kembali ke Beranda</a>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      logoutUser();
      let count = 3;
      const el = document.getElementById('countdown');
      const timer = setInterval(() => {
        count--;
        el.textContent = count;
        if (count <= 0) { clearInterval(timer); window.location.href = 'index.html'; }
      }, 1000);
    });
  </script>
</body>
</html>
